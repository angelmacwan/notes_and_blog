<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="navbar-inner">
    <button class="navbar-brand" data-view="home">
      <div class="navbar-logo-icon">
        <span class="material-symbols-outlined" style="font-size:1.1rem;">auto_stories</span>
      </div>
      <span class="navbar-brand-name">My Notes</span>
    </button>
  </div>
</header>

<main class="main-content" id="main-content">

  <div class="view active" id="view-home">
    <section class="hero">
      <div class="hero-inner">
        <p class="hero-eyebrow">Knowledge Base</p>
        <h1 class="hero-title">My Notes &amp; Blog</h1>
        <p class="hero-sub">Machine learning, data science, and programming — written to learn, shared to help.</p>
      </div>
      <div class="hero-search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input type="text" id="search-home" placeholder="Search everything…" oninput="searchHome(this.value)" autocomplete="off">
      </div>
    </section>

    <div class="page-wrap">
      <div class="cards-grid" id="grid-all"></div>
    </div>
  </div>

  <div class="view" id="view-reader">
    <div class="page-wrap reader-wrap">
      <button class="reader-back" id="reader-back">
        <span class="material-symbols-outlined" style="font-size:1rem;">arrow_back</span>Back
      </button>
      <div class="reader-cat" id="reader-cat"></div>
      <h1 class="reader-title" id="reader-title"></h1>
      <div class="reader-tags" id="reader-tags"></div>
      <hr class="reader-divider">
      <div class="reader-body" id="reader-body"></div>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="app.js"></script>
</body>
</html>
